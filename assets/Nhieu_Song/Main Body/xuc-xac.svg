<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Bàn phím máy tính (được làm nghiêng phối cảnh) -->
  <g id="keyboard" transform="translate(10, 80) rotate(-15) skewX(30)">
    <rect x="0" y="0" width="140" height="70" rx="4" fill="#1E293B" stroke="#334155" stroke-width="2"/>
    <!-- Các phím bấm -->
    <g fill="#0F172A" stroke="#334155" stroke-width="1">
      <rect x="5" y="5" width="20" height="15" rx="2"/>
      <rect x="30" y="5" width="20" height="15" rx="2"/>
      <rect x="55" y="5" width="20" height="15" rx="2"/>
      <rect x="80" y="5" width="55" height="15" rx="2"/>
      
      <rect x="5" y="25" width="30" height="15" rx="2"/>
      <rect x="40" y="25" width="20" height="15" rx="2"/>
      <rect x="65" y="25" width="20" height="15" rx="2"/>
      <rect x="90" y="25" width="45" height="15" rx="2"/>
      
      <rect x="5" y="45" width="130" height="15" rx="2"/> <!-- Spacebar -->
    </g>
  </g>

  <!-- Viên xúc xắc 1 (Màu trắng, viền xanh) -->
  <g id="dice-1" transform="translate(50, 40)">
    <polygon points="20,0 40,10 40,30 20,40 0,30 0,10" fill="#F8FAFC" />
    <polygon points="20,0 40,10 20,20 0,10" fill="#FFFFFF" />
    <polygon points="0,10 20,20 20,40 0,30" fill="#E2E8F0" />
    <polygon points="20,20 40,10 40,30 20,40" fill="#CBD5E1" />
    <!-- Chấm tròn -->
    <circle cx="20" cy="10" r="2.5" fill="#3B82F6" />
    <circle cx="10" cy="20" r="2.5" fill="#3B82F6" />
    <circle cx="10" cy="30" r="2.5" fill="#3B82F6" />
    <circle cx="30" cy="20" r="2.5" fill="#3B82F6" />
    <circle cx="30" cy="30" r="2.5" fill="#3B82F6" />
  </g>

  <!-- Viên xúc xắc 2 (Màu cam/đỏ nổi bật) -->
  <g id="dice-2" transform="translate(100, 20) scale(0.8)">
    <polygon points="20,0 40,10 40,30 20,40 0,30 0,10" fill="#FEF2F2" />
    <polygon points="20,0 40,10 20,20 0,10" fill="#FCA5A5" />
    <polygon points="0,10 20,20 20,40 0,30" fill="#EF4444" />
    <polygon points="20,20 40,10 40,30 20,40" fill="#B91C1C" />
    <!-- Chấm tròn -->
    <circle cx="20" cy="10" r="3" fill="#FFFFFF" />
    <circle cx="10" cy="25" r="3" fill="#FFFFFF" />
    <circle cx="30" cy="25" r="3" fill="#FFFFFF" />
  </g>
</svg>