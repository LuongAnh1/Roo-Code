<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 120" width="100%" height="100%">
  <!-- Dấu "+" thứ hai -->
  <g id="big-plus-2" transform="translate(10, 45)">
    <rect x="10" y="0" width="10" height="30" rx="3" fill="#A855F7" />
    <rect x="0" y="10" width="30" height="10" rx="3" fill="#A855F7" />
  </g>

  <!-- Mạng lưới điểm sáng (Luật số lớn) -->
  <g id="nodes-network" transform="translate(60, 10)">
    <!-- Đường line kết nối -->
    <g stroke="#C084FC" stroke-width="1.5" opacity="0.5">
      <line x1="20" y1="50" x2="60" y2="20" />
      <line x1="20" y1="50" x2="60" y2="80" />
      <line x1="60" y1="20" x2="100" y2="10" />
      <line x1="60" y1="20" x2="110" y2="50" />
      <line x1="60" y1="80" x2="110" y2="50" />
      <line x1="60" y1="80" x2="100" y2="90" />
      <line x1="110" y1="50" x2="150" y2="30" />
      <line x1="110" y1="50" x2="160" y2="70" />
      <!-- Mạng lưới lan rộng -->
      <line x1="150" y1="30" x2="180" y2="15" />
      <line x1="150" y1="30" x2="190" y2="45" />
      <line x1="160" y1="70" x2="190" y2="45" />
      <line x1="160" y1="70" x2="185" y2="85" />
    </g>
    
    <!-- Các điểm sáng (Nodes) -->
    <g fill="#FFFFFF" stroke="#9333EA" stroke-width="2">
      <circle cx="20" cy="50" r="6" /> <!-- Điểm bắt đầu -->
      <circle cx="60" cy="20" r="5" />
      <circle cx="60" cy="80" r="5" />
      <circle cx="100" cy="10" r="4" />
      <circle cx="110" cy="50" r="5" />
      <circle cx="100" cy="90" r="4" />
      <circle cx="150" cy="30" r="3.5" />
      <circle cx="160" cy="70" r="3.5" />
      <circle cx="180" cy="15" r="2.5" />
      <circle cx="190" cy="45" r="2.5" />
      <circle cx="185" cy="85" r="2.5" />
    </g>
    <!-- Ánh sáng lan tỏa đại diện sự nhân lên -->
    <circle cx="170" cy="50" r="40" fill="#E879F9" opacity="0.1" />
  </g>
</svg>