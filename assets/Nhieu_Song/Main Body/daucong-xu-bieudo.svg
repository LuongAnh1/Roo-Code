<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 120" width="100%" height="100%">
  <!-- Dấu "+" to đùng -->
  <g id="big-plus" transform="translate(10, 45)">
    <rect x="10" y="0" width="10" height="30" rx="3" fill="#22D3EE" />
    <rect x="0" y="10" width="30" height="10" rx="3" fill="#22D3EE" />
  </g>

  <!-- Đồng xu lật (Bernoulli 0/1) -->
  <g id="coin-flip" transform="translate(60, 30)">
    <!-- Hiệu ứng bóng/lật phía sau -->
    <ellipse cx="30" cy="30" rx="20" ry="30" fill="#FBBF24" opacity="0.3" />
    <ellipse cx="30" cy="30" rx="25" ry="28" fill="#FBBF24" opacity="0.5" />
    <!-- Đồng xu chính -->
    <circle cx="30" cy="30" r="25" fill="#F59E0B" />
    <circle cx="30" cy="30" r="20" fill="#FCD34D" />
    <text x="30" y="38" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#B45309" text-anchor="middle">1</text>
    <!-- Số 0 lờ mờ đại diện mặt sau -->
    <text x="5" y="15" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#FBBF24" opacity="0.6">0</text>
  </g>

  <!-- Biểu đồ phân phối Nhị thức (Hình chuông) -->
  <g id="binomial-chart" transform="translate(140, 20)">
    <!-- Trục tọa độ -->
    <path d="M 0 0 L 0 80 L 100 80" fill="none" stroke="#64748B" stroke-width="2" />
    <!-- Cột phân phối -->
    <g fill="#3B82F6" opacity="0.6">
      <rect x="10" y="60" width="10" height="20" rx="1" />
      <rect x="25" y="40" width="10" height="40" rx="1" />
      <rect x="40" y="15" width="10" height="65" rx="1" />
      <rect x="55" y="40" width="10" height="40" rx="1" />
      <rect x="70" y="60" width="10" height="20" rx="1" />
      <rect x="85" y="70" width="10" height="10" rx="1" />
    </g>
    <!-- Đường cong chuông (Bell curve) -->
    <path d="M 5 70 Q 25 35 45 10 T 85 75" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>